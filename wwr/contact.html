<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
      content="Contact White Water Rafting for inquires, support. we're here to help plan your adventures!">
    <meta name="author" content="Arowolaje Joshua Oluwatimileyin">
    <title>Contact Us | White Water Rafting</title>
    <link rel="stylesheet" href="styles/rafting.css">

</head>

<body>

    <header>
        <img src="images/logo.png" alt="Rafting Company Logo">

        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <main>

            <!-- SECTION 1: Contact Info + Map + Form -->
            <section class="contact-container">

                <!-- Company Info -->
                <div class="company-info">
                    <h1>White Water Rafting Company</h1>
                    <p>12 Main River Street</p>
                    <p>Kolob, California</p>
                    <p>+1 364 926 7143</p>
                    <p>info@whitewater.com</p>
                </div>

                <!-- Map + Form Layout -->
                <div class="contact-content">

                    <!-- Google Map -->
                    <div class="map">
                        <iframe
                          src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d50697.83386334846!2d-113.1948777583962!3d37.42258296701248!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x80ca91afad231a8f%3A0xec6734a36c88eb1f!2sKolob%20Canyons!5e0!3m2!1sen!2sng!4v1780825976320!5m2!1sen!2sng"
                          width="450" height="450" style="border:0;" allowfullscreen=""
                          loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                    </div>

                    <!-- Contact Form -->
                    <div class="form-section">
                        <form>

                            <label for="name">Name</label>
                            <input type="text" id="name" name="name" required>

                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" required>

                            <p>Message Purpose</p>

                            <label>
                                <input type="radio" name="purpose" value="general"> General Inquiry
                            </label>

                            <label>
                                <input type="radio" name="purpose" value="reservation"> Reservation
                                Question
                            </label>

                            <label>
                                <input type="radio" name="purpose" value="suggestion"> Website
                                Suggestion
                            </label>

                            <label for="message">Message</label>
                            <textarea id="message" name="message"></textarea>

                            <label>
                                <input type="checkbox" name="subscribe">
                                Please subscribe me to the monthly newsletter
                            </label>

                            <button type="submit">Get in Touch!</button>

                        </form>
                    </div>

                </div>
            </section>


            <!-- SECTION 2: Employee Profiles -->
            <section class="employees">

                <h2>We Are Here to Serve You</h2>

                <div class="employee-profiles">

                    <figure>
                        <img src="images/employee1.jpg" alt="Employee 1">
                        <figcaption>John Doe - Manager</figcaption>
                    </figure>

                    <figure>
                        <img src="images/employee2.jpg" alt="Employee 2">
                        <figcaption>Deborah Smith - Lead Guide</figcaption>
                    </figure>

                    <figure>
                        <img src="images/employee3.jpg" alt="Employee 3">
                        <figcaption>Mike David - Support Staff</figcaption>
                    </figure>

                </div>

            </section>

        </main>
    </main>
    <footer>
        <p>
            &copy; 2026 White Water Rafting | Arowolaje Joshua Oluwatimileyin
        </p>
        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook.jpg" alt="Facebook Icon">
            </a>

            <a href="https://linkedin.com">
                <img src="images/linkedin.jpg" alt="LinkedIn Icon">
            </a>

            <a href="https://instagram.com">
                <img src="images/instagram.jpg" alt="Instagram Icon">
            </a>
        </nav>
    </footer>
</body>

</html>
